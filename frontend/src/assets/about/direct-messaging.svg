<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" rx="16" fill="#FAF7F2"/>
  <!-- Sidebar -->
  <rect x="0" y="0" width="240" height="400" rx="16" fill="#FFFFFF" stroke="#E8DFD1"/>
  <rect x="20" y="30" width="160" height="20" rx="4" fill="#E8DFD1"/>
  <circle cx="40" cy="80" r="20" fill="#BB3E2D"/>
  <rect x="70" y="70" width="120" height="10" rx="2" fill="#1F1D18"/>
  <rect x="70" y="85" width="80" height="6" rx="2" fill="#9C9181"/>
  
  <rect x="10" y="120" width="220" height="60" rx="8" fill="#F0E9DD"/>
  <circle cx="40" cy="150" r="20" fill="#BB3E2D"/>
  <rect x="70" y="140" width="120" height="10" rx="2" fill="#FFFFFF"/>
  <rect x="70" y="155" width="80" height="6" rx="2" fill="#FFFFFF" fill-opacity="0.6"/>
  
  <!-- Chat Area -->
  <rect x="260" y="20" width="520" height="360" rx="12" fill="#FFFFFF" stroke="#E8DFD1"/>
  <rect x="280" y="40" width="200" height="15" rx="4" fill="#1F1D18"/>
  
  <!-- Bubbles -->
  <rect x="280" y="80" width="300" height="40" rx="12" fill="#F0E6D7"/>
  <rect x="460" y="140" width="300" height="60" rx="12" fill="#BB3E2D"/>
  <rect x="280" y="220" width="250" height="40" rx="12" fill="#F0E6D7"/>
  
  <!-- Input -->
  <rect x="280" y="330" width="480" height="40" rx="20" fill="#FDF9F3" stroke="#E8DFD1"/>
  <text x="310" y="355" font-family="Arial" font-size="14" fill="#9C9181">Type your message...</text>
  <circle cx="740" cy="350" r="15" fill="#BB3E2D"/>
</svg>
