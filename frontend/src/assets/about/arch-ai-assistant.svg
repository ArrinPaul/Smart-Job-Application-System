<svg width="600" height="300" viewBox="0 0 600 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="300" rx="12" fill="#F8FAF4"/>
  <!-- Flow Blocks -->
  <rect x="40" y="110" width="100" height="80" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="90" y="145" font-family="Arial" font-size="12" font-weight="bold" fill="#1E293B" text-anchor="middle">USER</text>
  <text x="90" y="165" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">PROMPT</text>

  <path d="M140 150 L180 150" stroke="#BB3E2D" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="180" y="80" width="140" height="140" rx="8" fill="#FFFBEB" stroke="#F59E0B"/>
  <text x="250" y="115" font-family="Arial" font-size="12" font-weight="bold" fill="#B45309" text-anchor="middle">BACKEND</text>
  <text x="250" y="140" font-family="Arial" font-size="10" fill="#D97706" text-anchor="middle">+ Profile Context</text>
  <text x="250" y="160" font-family="Arial" font-size="10" fill="#D97706" text-anchor="middle">+ Job Metadata</text>
  <text x="250" y="180" font-family="Arial" font-size="10" fill="#D97706" text-anchor="middle">+ Chat History</text>

  <path d="M320 150 L360 150" stroke="#BB3E2D" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="360" y="110" width="200" height="80" rx="8" fill="#EEF2FF" stroke="#6366F1"/>
  <text x="460" y="145" font-family="Arial" font-size="12" font-weight="bold" fill="#3730A3" text-anchor="middle">LLM CLOUD</text>
  <text x="460" y="165" font-family="Arial" font-size="10" fill="#4338CA" text-anchor="middle">Groq / HuggingFace / OpenAI</text>

  <path d="M460 190 Q460 260 250 260 Q40 260 40 190" stroke="#94A3B8" stroke-dasharray="4 2" fill="none" marker-end="url(#arrow)"/>
  <text x="250" y="250" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">STREAMED RESPONSE</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#BB3E2D" />
    </marker>
  </defs>
</svg>
