<svg width="600" height="300" viewBox="0 0 600 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="300" rx="12" fill="#FDFCFB"/>
  
  <rect x="50" y="80" width="120" height="60" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="110" y="115" font-family="Arial" font-size="12" font-weight="bold" fill="#1E293B" text-anchor="middle">SEEKER</text>
  
  <rect x="430" y="80" width="120" height="60" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="490" y="115" font-family="Arial" font-size="12" font-weight="bold" fill="#1E293B" text-anchor="middle">RECRUITER</text>

  <path d="M170 110 L430 110" stroke="#BB3E2D" stroke-width="2" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
  <text x="300" y="100" font-family="Arial" font-size="10" fill="#BB3E2D" text-anchor="middle">REAL-TIME CHAT</text>

  <rect x="220" y="180" width="160" height="100" rx="12" fill="#F1F5F9" stroke="#94A3B8"/>
  <text x="300" y="210" font-family="Arial" font-size="12" font-weight="bold" fill="#334155" text-anchor="middle">DATABASE</text>
  <text x="300" y="235" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">Atomic isRead States</text>
  <text x="300" y="255" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">Binary Attachments</text>

  <path d="M300 110 L300 180" stroke="#94A3B8" stroke-dasharray="4 2"/>

  <defs>
    <marker id="arrow-start" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#BB3E2D" />
    </marker>
    <marker id="arrow-end" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#BB3E2D" />
    </marker>
  </defs>
</svg>
