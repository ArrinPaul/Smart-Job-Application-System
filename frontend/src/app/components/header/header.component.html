<header class="app-header" *ngIf="isVisible">
  <div class="header-shell">
    <a routerLink="/" class="brand">
      <span class="brand-mark">S</span>
      <span class="brand-copy">
        <span class="brand-title">Smart Job Portal</span>
        <span class="brand-subtitle">Hiring made clearer</span>
      </span>
    </a>

    <nav class="main-nav" *ngIf="isLoggedIn">
      <a *ngIf="isJobSeeker()" routerLink="/dashboard" routerLinkActive="active" class="nav-item">Dashboard</a>
      <a routerLink="/jobs" routerLinkActive="active" class="nav-item">Jobs</a>
      
      <!-- Recruiter specific links -->
      <a *ngIf="isRecruiter()" routerLink="/post-job" routerLinkActive="active" class="nav-item">Post Job</a>
      <a *ngIf="isRecruiter()" routerLink="/recruiter/applications" routerLinkActive="active" class="nav-item">Applications</a>
      
      <!-- Seeker specific links -->
      <a *ngIf="isJobSeeker()" routerLink="/applications" routerLinkActive="active" class="nav-item">My Apps</a>
      
      <a routerLink="/messages" routerLinkActive="active" class="nav-item msg-link">
        Messages
        <span class="unread-badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
      </a>
      <a *ngIf="!isRecruiter()" routerLink="/about" routerLinkActive="active" class="nav-item">About</a>
      <a routerLink="/profile" routerLinkActive="active" class="nav-item">Profile</a>
    </nav>

    <div class="header-actions">
      <ng-container *ngIf="isLoggedIn; else guestActions">
        <button class="btn-action btn-ghost" (click)="logout()">Logout</button>
      </ng-container>
      <ng-template #guestActions>
        <a routerLink="/login" class="btn-action btn-ghost">Login</a>
        <a routerLink="/register" class="btn-action btn-primary">Sign Up</a>
      </ng-template>
    </div>
  </div>
</header>
