<header class="main-header" *ngIf="isVisible">
  <div class="container">
    <div class="logo" routerLink="/">
      <span class="logo-text">SmartJob<span class="highlight">Portal</span></span>
    </div>

    <nav class="nav-links" *ngIf="isLoggedIn">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
        <i class="fas fa-th-large"></i> Dashboard
      </a>
      <a routerLink="/jobs" routerLinkActive="active" class="nav-item">
        <i class="fas fa-briefcase"></i> Job Listings
      </a>
      <a routerLink="/about" routerLinkActive="active" class="nav-item">
        <i class="fas fa-info-circle"></i> About
      </a>
      <a routerLink="/profile" routerLinkActive="active" class="nav-item">
        <i class="fas fa-user"></i> Profile
      </a>
    </nav>

    <div class="auth-actions">
      <ng-container *ngIf="isLoggedIn; else guestActions">
        <button class="btn-logout" (click)="logout()">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </ng-container>
      <ng-template #guestActions>
        <a routerLink="/login" class="btn-login">Login</a>
        <a routerLink="/register" class="btn-register">Register</a>
      </ng-template>
    </div>
  </div>
</header>
