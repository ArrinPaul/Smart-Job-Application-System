<div class="page-shell admin-shell">
  <div class="page-header admin-header">
    <div>
      <h2>Control Center</h2>
      <p>Monitor platform health, user activity, jobs inventory, and operational metrics from one workspace.</p>
    </div>
  </div>

  <nav class="top-nav admin-nav">
    <a routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Overview</a>
    <a routerLink="/admin/users" routerLinkActive="active">Users</a>
    <a routerLink="/admin/jobs" routerLinkActive="active">Jobs</a>
    <a routerLink="/admin/system" routerLinkActive="active">System</a>
    <span class="nav-spacer admin-welcome">Welcome, {{ username }}</span>
    <button type="button" (click)="logout()">Logout</button>
  </nav>

  <router-outlet></router-outlet>
</div>
