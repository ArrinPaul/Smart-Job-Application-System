<!-- File: ./src/app/resume/resume.component.html -->
<div class="container">
  <div class="nav-links">
    <a routerLink="/jobs">Browse Jobs</a>
    <a routerLink="/applications">My Applications</a>
    <a routerLink="/resume" class="active">Upload Resume</a>
    <button (click)="logout()">Logout</button>
  </div>

  <h2>Upload Your Resume</h2>

  <div class="upload-section" style="background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); max-width: 500px; margin: 0 auto;">
    <p>Please select your resume (PDF, DOC, or DOCX) to upload.</p>
    <div style="margin: 20px 0;">
      <input type="file" (change)="onFileSelected($event)" accept=".pdf,.doc,.docx" style="border: 1px dashed #3498db; padding: 20px; width: 100%; box-sizing: border-box; text-align: center;">
    </div>
    <p *ngIf="selectedFile" style="font-weight: bold; color: #2c3e50;">Selected: {{ selectedFile.name }}</p>
    <button (click)="onUpload()" [disabled]="isUploading || !selectedFile" style="width: 100%;">{{ isUploading ? 'Uploading...' : 'Upload Now' }}</button>
  </div>

  <div style="max-width: 500px; margin: 20px auto;">
    <p *ngIf="successMessage" style="color: green;">{{ successMessage }}</p>
    <p *ngIf="errorMessage" style="color: red;">{{ errorMessage }}</p>
  </div>
</div>
