<div class="page-shell">
  <nav class="top-nav">
    <a routerLink="/jobs">Browse Jobs</a>
    <a routerLink="/applications">My Applications</a>
    <a routerLink="/resume" class="active">Resume Vault</a>
    <span class="nav-spacer"></span>
    <button type="button" (click)="logout()">Logout</button>
  </nav>

  <div class="page-header">
    <div>
      <h2>Upload Resume</h2>
      <p>Keep your latest resume ready so applying to roles is always one step away.</p>
    </div>
  </div>

  <section class="panel narrow">
    <div class="field-group">
      <label for="fileInput">Select Resume File</label>
      <input id="fileInput" type="file" (change)="onFileSelected($event)" accept=".pdf,.doc,.docx">
    </div>

    <p>Supported formats: PDF, DOC, DOCX. Maximum file size: 5MB.</p>

    <div class="meta-row" *ngIf="selectedFile">
      <span><strong>Selected:</strong> {{ selectedFile.name }}</span>
    </div>

    <div class="action-row">
      <button type="button" (click)="onUpload()" [disabled]="isUploading || !selectedFile">
        {{ isUploading ? 'Uploading...' : 'Upload Resume' }}
      </button>
    </div>
  </section>
</div>
