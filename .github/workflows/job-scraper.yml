name: Job Scraper & Sync to Supabase

on:
  schedule:
    # Every 12 hours - at 00:00 and 12:00 UTC
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: tools/scraper
        run: npm ci

      - name: Scrape jobs from all sources
        working-directory: tools/scraper
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          SCRAPER_TRIGGER_TOKEN: ${{ secrets.SCRAPER_TRIGGER_TOKEN }}
          WEBHOOK_NOTIFY_URL: ${{ secrets.WEBHOOK_NOTIFY_URL }}
        run: node scrape_and_sync.js

      - name: Sync jobs to Supabase database
        working-directory: tools/scraper
        env:
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
        run: node sync_to_supabase.js
