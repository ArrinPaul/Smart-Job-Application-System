name: Job Scraper & Sync to Supabase

on:
  schedule:
    # Every 12 hours - at 00:00 and 12:00 UTC
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: tools/scraper
        run: npm ci

      - name: Scrape jobs from all sources
        working-directory: tools/scraper
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          SCRAPER_TRIGGER_TOKEN: ${{ secrets.SCRAPER_TRIGGER_TOKEN }}
          WEBHOOK_NOTIFY_URL: ${{ secrets.WEBHOOK_NOTIFY_URL }}
        run: node scrape_and_sync.js

      - name: Sync jobs to Supabase database
        working-directory: tools/scraper
        # Using environment variables from repo .env by default in the script,
        # but we can also pass them here if they were secrets.
        # The script sync_to_supabase.js loads ../../backend/.env
        run: node sync_to_supabase.js
