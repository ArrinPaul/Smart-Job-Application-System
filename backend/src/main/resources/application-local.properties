# Local development profile (no external PostgreSQL required)
# Activate with: SPRING_PROFILES_ACTIVE=local

spring.datasource.url=jdbc:h2:file:${user.home}/.smart-job-portal/data/jobportal-local;MODE=PostgreSQL;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

# Local convenience defaults
app.security.cookie.secure=false
app.security.cookie.same-site=Lax
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}

