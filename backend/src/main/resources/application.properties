# File: src/main/resources/application.properties

# ============================================
# SERVER CONFIGURATION - PRODUCTION OPTIMIZED
# ============================================
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.min-response-size-bytes=1024
server.compression.excluded-mime-types=image/jpeg,image/png,image/gif,video/mp4
server.http2.enabled=true
server.tomcat.accept-count=100
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=20
server.tomcat.threads.keepalive-timeout=60

# ============================================
# DATABASE & CONNECTION POOLING - RAILWAY & CLOUD READY
# ============================================
# Railway provides MYSQL_URL, but Spring needs jdbc:mysql prefix.
# We use the individual components provided by Railway for maximum compatibility.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:jobportal_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool (Optimized for cloud latency)
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:20}
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=900000
spring.datasource.hikari.max-lifetime=2000000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.register-mbeans=true
spring.datasource.hikari.cache-prep-stmts=true
spring.datasource.hikari.prep-stmt-cache-size=250
spring.datasource.hikari.prep-stmt-cache-sql-limit=2048

# ============================================
# JPA/HIBERNATE - QUERY OPTIMIZATION
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=false
spring.jpa.open-in-view=false

# ============================================
# LOGGING - PRODUCTION LEVEL
# ============================================
logging.level.root=WARN
logging.level.com.edutech=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=${LOG_PATH:logs/application.log}
logging.file.max-size=10MB
logging.file.max-history=30
logging.file.total-size-cap=1GB

# ============================================
# JWT CONFIGURATION
# ============================================
# Always use a strong, unique secret in production
jwt.secret=${JWT_SECRET:smartjobportalsecretkey2024}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================
# CORS CONFIGURATION - CLOUD READY
# ============================================
# Can be set to a comma-separated list of origins (e.g. https://yourapp.up.railway.app)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}

# ============================================
# FILE UPLOAD CONFIGURATION
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.location=${java.io.tmpdir}

# ============================================
# TASK EXECUTOR - CONCURRENT PROCESSING
# ============================================
spring.task.execution.pool.core-size=20
spring.task.execution.pool.max-size=50
spring.task.execution.pool.queue-capacity=500
spring.task.execution.thread-name-prefix=jobportal-
spring.task.scheduling.pool.size=10
spring.task.scheduling.thread-name-prefix=jobportal-scheduler-

# ============================================
# SPRING CACHE (if enabled)
# ============================================
spring.cache.type=none

# ============================================
# DEFAULT ADMIN BOOTSTRAP
# ============================================
app.admin.bootstrap.enabled=${ADMIN_BOOTSTRAP_ENABLED:true}
app.admin.bootstrap.username=${ADMIN_BOOTSTRAP_USERNAME:admin}
app.admin.bootstrap.email=${ADMIN_BOOTSTRAP_EMAIL:arrinpaul11@gmail.com}
app.admin.bootstrap.password=${ADMIN_BOOTSTRAP_PASSWORD:Arrin@11}

# ============================================
# ACTUATOR & MONITORING
# ============================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoints.web.base-path=/actuator
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# ============================================
# APPLICATION PERFORMANCE
# ============================================
spring.mvc.async.request-timeout=30000
spring.mvc.log-request-details=false
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false

# ============================================
# STARTUP & SHUTDOWN
# ============================================
spring.lifecycle.timeout-per-shutdown-phase=30s
server.shutdown=graceful
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
