# File: src/main/resources/application.properties

# ============================================
# SERVER CONFIGURATION - PRODUCTION OPTIMIZED
# ============================================
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.min-response-size-bytes=1024
server.compression.excluded-mime-types=image/jpeg,image/png,image/gif,video/mp4
server.http2.enabled=true
server.tomcat.accept-count=100
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=20
server.tomcat.threads.keepalive-timeout=60

# ============================================
# DATABASE & CONNECTION POOLING - POSTGRESQL (SUPABASE READY)
# ============================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${SUPABASE_DB_HOST:localhost}:${SUPABASE_DB_PORT:5432}/${SUPABASE_DB_NAME:postgres}?sslmode=require&prepareThreshold=0&preparedStatementCacheQueries=0&preparedStatementCacheSizeMiB=0&binaryTransfer=false&preferQueryMode=simple}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool (Optimized for cloud latency)
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:20}
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=900000
spring.datasource.hikari.max-lifetime=2000000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.register-mbeans=true
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheSizeMiB=0
spring.datasource.hikari.data-source-properties.binaryTransfer=false
spring.datasource.hikari.data-source-properties.preferQueryMode=simple

# ============================================
# JPA/HIBERNATE - QUERY OPTIMIZATION
# ============================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=false
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/supabase
spring.flyway.baseline-on-migrate=true

# ============================================
# LOGGING - PRODUCTION LEVEL
# ============================================
logging.level.root=WARN
logging.level.com.edutech=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=${LOG_PATH:logs/application.log}
logging.file.max-size=10MB
logging.file.max-history=30
logging.file.total-size-cap=1GB

# ============================================
# JWT CONFIGURATION
# ============================================
# Always use a strong, unique secret in production
jwt.secret=${JWT_SECRET:CHANGE_THIS_SECRET_IN_ENV_32_CHAR_MINIMUM}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================
# CORS CONFIGURATION - CLOUD READY
# ============================================
# Can be set to a comma-separated list of origins (e.g. https://yourapp.up.railway.app)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}

# ============================================
# FILE UPLOAD CONFIGURATION
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.location=${java.io.tmpdir}

# ============================================
# TASK EXECUTOR - CONCURRENT PROCESSING
# ============================================
spring.task.execution.pool.core-size=20
spring.task.execution.pool.max-size=50
spring.task.execution.pool.queue-capacity=500
spring.task.execution.thread-name-prefix=jobportal-
spring.task.scheduling.pool.size=10
spring.task.scheduling.thread-name-prefix=jobportal-scheduler-

# ============================================
# SPRING CACHE (if enabled)
# ============================================
spring.cache.type=none

# ============================================
# DEFAULT ADMIN BOOTSTRAP
# ============================================
app.admin.bootstrap.enabled=${ADMIN_BOOTSTRAP_ENABLED:false}
app.admin.bootstrap.username=${ADMIN_BOOTSTRAP_USERNAME:admin}
app.admin.bootstrap.email=${ADMIN_BOOTSTRAP_EMAIL:admin@example.com}
app.admin.bootstrap.password=${ADMIN_BOOTSTRAP_PASSWORD:}

# ============================================
# SECURITY HARDENING
# ============================================
app.data-loader.enabled=${DATA_LOADER_ENABLED:false}
app.data-loader.sample-password=${DATA_LOADER_SAMPLE_PASSWORD:ChangeMe123!}
app.security.max-request-bytes=${MAX_REQUEST_BYTES:1048576}
app.security.cookie.name=${AUTH_COOKIE_NAME:AUTH_TOKEN}
app.security.cookie.secure=${AUTH_COOKIE_SECURE:true}
app.security.cookie.same-site=${AUTH_COOKIE_SAME_SITE:Strict}
app.security.auth-rate-limit.capacity=${AUTH_RATE_LIMIT_CAPACITY:5}
app.security.auth-rate-limit.window-minutes=${AUTH_RATE_LIMIT_WINDOW_MINUTES:15}
app.security.captcha.enabled=${CAPTCHA_ENABLED:false}
app.security.captcha.secret=${CAPTCHA_SECRET:}
app.security.captcha.verify-url=${CAPTCHA_VERIFY_URL:https://www.google.com/recaptcha/api/siteverify}
app.security.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:4200}
app.security.mfa.issuer=${MFA_ISSUER:SmartJobPortal}
app.security.mfa.enforce-sensitive-actions=${MFA_ENFORCE_SENSITIVE_ACTIONS:true}
app.security.email.enabled=${SECURITY_EMAIL_ENABLED:false}
app.security.email.from=${SECURITY_EMAIL_FROM:no-reply@jobportal.local}
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}

# ============================================
# ACTUATOR & MONITORING
# ============================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoints.web.base-path=/actuator
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.health.mail.enabled=false

# ============================================
# APPLICATION PERFORMANCE
# ============================================
spring.mvc.async.request-timeout=30000
spring.mvc.log-request-details=false
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# ============================================
# STARTUP & SHUTDOWN
# ============================================
spring.lifecycle.timeout-per-shutdown-phase=30s
server.shutdown=graceful
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
